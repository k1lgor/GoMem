name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            suffix: ''
          - os: macos-latest
            suffix: ''
          - os: windows-latest
            suffix: '.exe'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - run: go vet ./...
      - run: go test -count=1 -timeout 60s ./...
      - run: go build -ldflags="-X main.Version=${{ github.ref_name }}" -o gomem${{ matrix.suffix }} ./cmd/gomem/
      - uses: actions/upload-artifact@v7
        with:
          name: gomem-${{ matrix.os }}
          path: gomem${{ matrix.suffix }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download all artifacts
        uses: actions/download-artifact@v8
      - name: Generate release notes from CHANGELOG
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            /^## \[/ { found = 0 }
            /^## \['"$VERSION"'\]/ { found = 1; next }
            /^## \[/ && found { exit }
            found { print }
          ' CHANGELOG.md > /tmp/version-notes.md
          if [ ! -s /tmp/version-notes.md ]; then
            awk '
              /^## \[Unreleased\]/ { found = 1; next }
              /^## \[/ && found { exit }
              found { print }
            ' CHANGELOG.md > /tmp/version-notes.md
          fi
          echo "" >> /tmp/version-notes.md
          echo "### Downloads" >> /tmp/version-notes.md
          echo "| File | Platform |" >> /tmp/version-notes.md
          echo "|------|----------|" >> /tmp/version-notes.md
          echo "| \`gomem-ubuntu-latest/gomem\` | Linux (x86_64) |" >> /tmp/version-notes.md
          echo "| \`gomem-macos-latest/gomem\` | macOS (x86_64) |" >> /tmp/version-notes.md
          echo "| \`gomem-windows-latest/gomem.exe\` | Windows (x86_64) |" >> /tmp/version-notes.md
          cp /tmp/version-notes.md release-notes.md
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          files: |
            gomem-ubuntu-latest/gomem
            gomem-macos-latest/gomem
            gomem-windows-latest/gomem.exe
          fail_on_unmatched_files: false
